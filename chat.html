<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostChat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">

        <div class="chat-header">
            <i class="fa-solid fa-arrow-left" onclick="window.location.href='chats.html'"></i>
            <div class="header-center">
                <div id="connectionStatus" class="connection-status-header"></div>
            </div>
            <span id="myCode" class="my-code"></span>
        </div>

        <div class="search-area">
            <input type="text" id="searchCode" placeholder="Enter Ghost Code to connect...">
            <button onclick="startChat()">Connect</button>
        </div>

        <div id="typingIndicator" class="typing-indicator"></div>

        <div id="chatBox" class="chat-box"></div>

        <div id="replyBar" class="reply-bar" style="display:none"></div>

        <div class="input-area">
            <textarea id="msgInput" placeholder="Type your message..." rows="1"
                oninput="onTyping()"
                onblur="setTyping(false)"
                onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
            <button onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
