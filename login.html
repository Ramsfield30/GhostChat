<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostChat - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('SW registered'))
        .catch(err => console.log('SW error:', err))
}
</script>
</head>
<body class="auth-page">
    <div class="container">
        <div class="logo">👻 GhostChat</div>
        <p class="tagline">Welcome Back Ghost</p>
        <div class="form-card">
            <input type="email" id="email" placeholder="Enter your email">
            <div class="password-wrap">
                <input type="password" id="password" placeholder="Enter password">
                <i class="fa-solid fa-eye" onclick="togglePassword('password', this)"></i>
            </div>
            <!-- Add this BEFORE the existing login button -->

            <button onclick="login()" class="btn-primary">Login</button>
            <div style="text-align:center;color:#555;font-size:13px;margin:10px 0">or</div>

<button onclick="signInWithGoogle()" class="btn-secondary">
    <i class="fa-brands fa-google"></i> Continue with Google
</button>
            <p class="switch">No account? <a href="signup.html">Sign Up</a></p>
            <p class="switch">Forgot password? <a href="reset.html">Reset here</a></p>
        </div>
        <div id="message"></div>
        
    </div>
    <script src="script.js"></script>
</body>
</html>
