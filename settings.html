<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostChat - Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#7c3aed">
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('SW registered'))
        .catch(err => console.log('SW error:', err))
}
</script>
</head>
<body>
    <div class="chat-container">

        <div class="chat-header">
            <i class="fa-solid fa-arrow-left" onclick="window.location.href='chats.html'"></i>
            <span>⚙️ Settings</span>
            <span></span>
        </div>

        <div class="settings-body">

            <div class="settings-section">
                <div class="settings-title">💬 Messages</div>

                <div class="settings-item">
                    <div class="settings-info">
                        <div class="settings-label">Auto Delete Messages</div>
                        <div class="settings-desc">Automatically delete your messages after the other person replies</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="autoDeleteToggle" onchange="saveSettings()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-title">👤 Account</div>

                <div class="settings-item">
                    <div class="settings-info">
                        <div class="settings-label">Ghost Code</div>
                        <div class="settings-desc" id="myGhostCode"></div>
                    </div>
                    <i class="fa-solid fa-copy" onclick="copyCode()"></i>
                </div>
            </div>
            <div class="settings-item">
    <div class="settings-info">
        <div class="settings-label">🔔 Notifications</div>
        <div class="settings-desc">Get notified when you receive messages</div>
    </div>
    <label class="toggle-switch">
        <input type="checkbox" id="notifToggle" onchange="toggleNotifications()">
        <span class="toggle-slider"></span>
    </label>
</div>

            <div id="settingsMessage" class="settings-message"></div>

            <button class="btn-danger" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>

        </div>

    </div>
    <script src="script.js"></script>
    <script>
        const code = localStorage.getItem('ghostCode')
        if (code) document.getElementById('myGhostCode').textContent = code

        function copyCode() {
            navigator.clipboard.writeText(code)
            const msg = document.getElementById('settingsMessage')
            msg.textContent = '✅ Ghost Code copied!'
            setTimeout(() => msg.textContent = '', 2000)
        }
        async function toggleNotifications() {
    const toggle = document.getElementById('notifToggle')
    if (toggle.checked) {
        const permission = await Notification.requestPermission()
        if (permission === 'granted') {
            toggle.checked = true
            localStorage.setItem('notifications', 'true')
        } else {
            toggle.checked = false
            localStorage.setItem('notifications', 'false')
            alert('Please allow notifications in your browser settings!')
        }
    } else {
        localStorage.setItem('notifications', 'false')
    }
}

function loadNotificationState() {
    const toggle = document.getElementById('notifToggle')
    if (toggle) {
        toggle.checked = Notification.permission === 'granted'
    }
}
    </script>
</body>
</html>
