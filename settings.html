<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostChat - Settings</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">

        <div class="chat-header">
            <i class="fa-solid fa-arrow-left" onclick="window.location.href='chats.html'"></i>
            <span>⚙️ Settings</span>
            <span></span>
        </div>

        <div class="settings-body">

            <div class="settings-section">
                <div class="settings-title">💬 Messages</div>

                <div class="settings-item">
                    <div class="settings-info">
                        <div class="settings-label">Auto Delete Messages</div>
                        <div class="settings-desc">Automatically delete your messages after the other person replies</div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="autoDeleteToggle" onchange="saveSettings()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-title">👤 Account</div>

                <div class="settings-item">
                    <div class="settings-info">
                        <div class="settings-label">Ghost Code</div>
                        <div class="settings-desc" id="myGhostCode"></div>
                    </div>
                    <i class="fa-solid fa-copy" onclick="copyCode()"></i>
                </div>
            </div>

            <div id="settingsMessage" class="settings-message"></div>

            <button class="btn-danger" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>

        </div>

    </div>
    <script src="script.js"></script>
    <script>
        const code = localStorage.getItem('ghostCode')
        if (code) document.getElementById('myGhostCode').textContent = code

        function copyCode() {
            navigator.clipboard.writeText(code)
            const msg = document.getElementById('settingsMessage')
            msg.textContent = '✅ Ghost Code copied!'
            setTimeout(() => msg.textContent = '', 2000)
        }
    </script>
</body>
</html>
